name: validate
permissions:
  id-token: write # Required for OIDC / npm provenance
  contents: write # auto needs to push the version commit + tag to main
  issues: write # auto comments on released issues
  pull-requests: write # auto comments on released PRs
on:
  push:
    branches:
      - 'main'
      - 'beta'
  pull_request: {}
jobs:
  main:
    strategy:
      matrix:
        node: [22]
        vite: [6]
    runs-on: ubuntu-latest
    steps:
      - name: 🛑 Cancel Previous Runs
        uses: styfle/cancel-workflow-action@0.9.0

      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4

      - name: ⎔ Setup node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: 📥 Download deps
        uses: bahmutov/npm-install@v1
        with:
          useLockFile: false

      - name: ⚡️ Setup vite
        run: npm install vite@${{ matrix.vite }}

      - name: 🧹 Linting
        run: npm run lint

      - name: ✅ Tests
        run: npm run test

  release:
    needs: main
    runs-on: ubuntu-latest
    if:
      ${{ github.repository == 'christianwiedemann/vite-plugin-twing-drupal' &&
      github.ref == 'refs/heads/main' && github.event_name == 'push' }}
    steps:
      - name: 🛑 Cancel Previous Runs
        uses: styfle/cancel-workflow-action@0.9.0

      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # auto needs full history + tags to compute the release

      - name: ⎔ Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: 📥 Download deps
        uses: bahmutov/npm-install@v1
        with:
          useLockFile: false

      - name: 🚀 Release (auto, PR-label driven)
        run: npx auto shipit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
